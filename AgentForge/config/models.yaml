default_model: claude-sonnet-4-6

models:
  claude-sonnet-4-6:
    provider: anthropic
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8000

  claude-opus-4-6:
    provider: anthropic
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8000

  claude-haiku-4-5:
    provider: anthropic
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8000

  gpt-4o:
    provider: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    max_tokens: 4096

  gpt-4o-mini:
    provider: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    max_tokens: 4096

  # 国内厂商 - DeepSeek
  deepseek-chat:
    provider: openai
    base_url: https://api.deepseek.com/anthropic
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8000

  # Kimo (Moonshot)
  kimi-k2.5:
    provider: openai
    base_url: https://api.moonshot.cn/anthropic
    api_key_env: MOONSHOT_API_KEY
    max_tokens: 8000

  # Zhipu (GLM)
  glm-5:
    provider: openai
    base_url: https://open.bigmodel.cn/api/anthropic
    api_key_env: ZHIPU_API_KEY
    max_tokens: 8000

  # MiniMax
  minimax-m2.5:
    provider: openai
    base_url: https://api.minimaxi.com/anthropic
    api_key_env: MINIMAX_API_KEY
    max_tokens: 8000
