servers:
  filesystem:
    command: npx
    args: ["-y", "@anthropic/mcp-filesystem"]
    env:
      MCP_FILE_ROOT: ./workspace

  github:
    command: npx
    args: ["-y", "@anthropic/mcp-github"]
    env:
      GITHUB_TOKEN: ${GITHUB_TOKEN}

  postgres:
    command: npx
    args: ["-y", "@anthropic/mcp-postgres"]
    env:
      DATABASE_URL: ${DATABASE_URL}
